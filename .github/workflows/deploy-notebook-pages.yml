name: Deploy Notebook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install notebook tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter nbconvert

      - name: Build notebook site
        run: |
          mkdir -p _site
          jupyter nbconvert \
            --to html \
            --output-dir _site \
            notebooks/cjpt_exploration.ipynb
          cp notebooks/cjpt_exploration.ipynb _site/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>CJPT Notebook</title>
          </head>
          <body>
            <h1>CJPT Notebook</h1>
            <ul>
              <li><a href="./cjpt_exploration.html">View notebook as HTML</a></li>
              <li><a href="./cjpt_exploration.ipynb">Download notebook (.ipynb)</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
